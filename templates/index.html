<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BigQuery Release Notes</title>
  <meta name="description" content="Browse the latest Google BigQuery release notes and share updates on Twitter." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer" aria-live="polite"></div>

  <div class="app-container" id="appContainer">
    <!-- Header -->
    <header class="app-header">
      <div class="app-header__icon">
        <svg viewBox="0 0 24 24">
          <path d="M19.35 10.04A7.49 7.49 0 0012 4C9.11 4 6.6 5.64 5.35 8.04A5.994 5.994 0 000 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/>
        </svg>
      </div>
      <h1 class="app-header__title">BigQuery Release Notes</h1>
      <p class="app-header__subtitle">Latest updates from the Google Cloud BigQuery feed</p>

      <!-- Theme Toggle -->
      <div class="theme-toggle" id="themeToggle">
        <svg class="theme-toggle__icon" viewBox="0 0 24 24" id="themeIconMoon">
          <path d="M12 3a9 9 0 109 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 01-4.4 2.26 5.403 5.403 0 01-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/>
        </svg>
        <div class="theme-toggle__track" id="themeTrack" role="switch" aria-checked="false" aria-label="Toggle light mode" tabindex="0"></div>
        <svg class="theme-toggle__icon" viewBox="0 0 24 24" id="themeIconSun">
          <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0a.996.996 0 000-1.41l-1.06-1.06zm1.06-10.96a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36a.996.996 0 000-1.41.996.996 0 00-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>
        </svg>
      </div>
    </header>

    <!-- Onboarding Hint (#1) -->
    <div class="onboarding-hint" id="onboardingHint">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
      <span>💡 Click any card to select it, then tweet about it. Hover to copy details.</span>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="toolbar__info">
        <span id="noteCount">—</span> entries &middot; Updated at <span id="lastUpdated">—</span>
      </div>
      <div class="toolbar__actions">
        <button class="btn btn--ghost" id="exportCsvBtn" type="button" disabled>
          <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          Export CSV
        </button>
        <button class="btn btn--primary" id="refreshBtn" type="button">
          <div class="spinner" id="refreshSpinner" style="display:none"></div>
          <span id="refreshLabel">Refresh Feed</span>
        </button>
      </div>
    </div>

    <!-- Search Bar (#10) -->
    <div class="search-bar">
      <svg class="search-bar__icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <input class="search-bar__input" id="searchInput" type="text" placeholder="Search release notes..." aria-label="Search release notes" />
    </div>

    <!-- Filter & Sort Bar (#11, #12) -->
    <div class="filter-bar">
      <button class="filter-chip filter-chip--active" data-filter="all" type="button">All</button>
      <button class="filter-chip" data-filter="7" type="button">Last 7 days</button>
      <button class="filter-chip" data-filter="30" type="button">Last 30 days</button>
      <button class="filter-chip" data-filter="90" type="button">Last 90 days</button>
      <div class="filter-bar__separator"></div>
      <button class="sort-btn" id="sortBtn" type="button" title="Toggle sort order">
        <svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>
        Newest first
      </button>
    </div>

    <!-- Feed -->
    <section class="feed" id="feed" aria-label="Release notes feed">
      <!-- Cards injected by JS -->
    </section>
  </div>

  <!-- Floating Tweet Bar (#13: aria-live) -->
  <div class="tweet-bar" id="tweetBar" role="status" aria-live="polite">
    <span class="tweet-bar__text" id="tweetTitle">Select an update to tweet</span>
    <button class="btn btn--twitter" id="tweetBtn" type="button">
      <svg viewBox="0 0 24 24">
        <path d="M22.46 6c-.77.35-1.6.58-2.46.69a4.3 4.3 0 001.88-2.38 8.59 8.59 0 01-2.72 1.04 4.28 4.28 0 00-7.32 3.91A12.16 12.16 0 013.16 4.86a4.28 4.28 0 001.33 5.71 4.24 4.24 0 01-1.94-.54v.05a4.28 4.28 0 003.43 4.19 4.27 4.27 0 01-1.93.07 4.29 4.29 0 004 2.98A8.59 8.59 0 012 19.54a12.13 12.13 0 006.56 1.92c7.88 0 12.2-6.53 12.2-12.2 0-.19 0-.37-.01-.56A8.72 8.72 0 0024 5.56a8.49 8.49 0 01-2.54.7z"/>
      </svg>
      Tweet
    </button>
  </div>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
